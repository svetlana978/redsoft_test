syntax = "proto3";

package person;
option go_package = "./;person";

service PersonService {
    rpc CreatePerson(CreatePersonRequest) returns (PersonResponse);
    rpc GetPerson(GetPersonRequest) returns (PersonResponse);
    rpc ListPersons(ListPersonsRequest) returns (ListPersonsResponse);
    rpc UpdatePerson(UpdatePersonRequest) returns (SuccessResponse);
    rpc DeletePerson(DeletePersonRequest) returns (SuccessResponse);
}

message Person {
    int64 id = 1;
    string first_name = 2;
    string last_name = 3;
    optional string patronymic = 4;
    int32 age = 5;
    string gender = 6;
    string nationality = 7;
    repeated string emails = 8;
}

message CreatePersonRequest {
    string first_name = 1;
    string last_name = 2;
    optional string patronymic = 3;
    repeated string emails = 4;
}

message GetPersonRequest {
    int64 id = 1;
}

message ListPersonsRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message ListPersonsResponse {
    repeated Person persons = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message UpdatePersonRequest {
    int64 id = 1;
    optional string first_name = 2;
    optional string last_name = 3;
    optional string patronymic = 4;
    optional int32 age = 5;
    optional string gender = 6;
    optional string nationality = 7;
    repeated string emails = 8;
}

message DeletePersonRequest {
    int64 id = 1;
}

message SuccessResponse {
    bool success = 1;
}

message PersonResponse {
    Person person = 1;
}